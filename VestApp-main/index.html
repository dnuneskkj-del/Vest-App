<!doctype html>
<html lang="pt-BR" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/png" href="/Vestapp/img/vest.png" />
    <title>VestApp - O Ninho da Aprovação</title>
  </head>
  <body class="notranslate" translate="no">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear service workers safely with try/catch to ensure zero blocking of the main thread
      try {
        if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            if (registrations && registrations.length > 0) {
              var hasUnregistered = false;
              for (var i = 0; i < registrations.length; i++) {
                registrations[i].unregister().then(function(success) {
                  if (success && !hasUnregistered) {
                    hasUnregistered = true;
                    console.log('Service Worker successfully unregistered');
                    window.location.reload();
                  }
                });
              }
            }
          })["catch"](function(err) {
            console.log('Error unregistering service worker: ', err);
          });
        }
      } catch (e) {
        console.error('Service worker unregistration error:', e);
      }
    </script>
    
    <!-- Colorblind Filters -->
    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
      <defs>
        <filter id="protanopia-filter" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix" values="0.567, 0.433, 0, 0, 0, 0.558, 0.442, 0, 0, 0, 0, 0.242, 0.758, 0, 0, 0, 0, 0, 1, 0" />
        </filter>
        <filter id="deuteranopia-filter" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix" values="0.625, 0.375, 0, 0, 0, 0.7, 0.3, 0, 0, 0, 0, 0.3, 0.7, 0, 0, 0, 0, 0, 1, 0" />
        </filter>
        <filter id="tritanopia-filter" color-interpolation-filters="linearRGB">
          <feColorMatrix type="matrix" values="0.95, 0.05, 0, 0, 0, 0, 0.433, 0.567, 0, 0, 0, 0.475, 0.525, 0, 0, 0, 0, 0, 1, 0" />
        </filter>
      </defs>
    </svg>
  </body>
</html>
